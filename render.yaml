services:
  - type: web
    name: scf-agent-api
    runtime: python
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run uvicorn scf_agent.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: MODEL_VERSION
        value: v1
      - key: WACC
        value: "0.084"
      - key: RISK_THRESHOLD_SAFE
        value: "70"
      - key: RISK_THRESHOLD_WATCH
        value: "50"
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: scf-agent-dashboard
    runtime: python
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: API_BASE_URL
        fromService:
          name: scf-agent-api
          type: web
          property: host
